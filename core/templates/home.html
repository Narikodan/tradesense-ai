{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center">
    <!-- Search Bar -->
    <div class="w-full max-w-2xl relative">
        <input type="text" id="search-input" name="q" placeholder="Search NSE symbol or company name..."
               autocomplete="off"
               class="w-full px-5 py-3 border border-gray-300 dark:border-gray-600 rounded-full bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-lg text-lg"
               hx-get="/search/"
               hx-trigger="keyup changed delay:250ms"
               hx-target="#search-results"
               hx-indicator="#spinner">

        <div id="spinner" class="htmx-indicator absolute right-4 top-3">
            <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-blue-500"></div>
        </div>

        <div id="search-results" class="absolute z-10 w-full mt-1 rounded-xl overflow-hidden"></div>
    </div>

        <!-- Top Intraday Picks Section -->
    <div id="top-picks-section" class="w-full mt-10">
        <h2 class="text-2xl font-bold text-center mb-6">🔥 Today's Top Intraday Picks</h2>
        <div id="top-picks" hx-get="/picks/" hx-trigger="load delay:100ms" hx-indicator="#picks-spinner">
            <div id="picks-spinner" class="htmx-indicator flex justify-center mt-4">
                <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-blue-500"></div>
            </div>
        </div>
    </div>

    <!-- Analysis spinner -->
    <div id="analysis-spinner" class="htmx-indicator flex justify-center mt-8">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-500"></div>
    </div>

    <!-- Result Container -->
    <div id="analysis-results" class="w-full mt-8">
        <div class="text-center text-gray-500 dark:text-gray-400">
            <p class="text-xl">👆 Search for a stock to get trading suggestions</p>
        </div>
    </div>
</div>

<!-- Event delegation for suggestion clicks -->
<script>
    // Generic handler for both suggestion items and pick cards
    document.addEventListener('click', function(e) {
        // Suggestions
        const item = e.target.closest('.suggestion-item');
        if (item) {
            const symbol = item.getAttribute('data-symbol');
            if (!symbol) return;
            document.getElementById('search-input').value = symbol.replace('.NS', '');
            document.getElementById('search-results').innerHTML = '';
            htmx.ajax('GET', '/analyze/?symbol=' + encodeURIComponent(symbol), {
                target: '#analysis-results',
                swap: 'innerHTML',
                indicator: '#analysis-spinner'
            });
            return;
        }
        
        // Top picks card
        const pick = e.target.closest('.pick-card');
        if (pick) {
            const symbol = pick.getAttribute('data-symbol');
            if (!symbol) return;
            document.getElementById('search-input').value = symbol.replace('.NS', '');
            document.getElementById('search-results').innerHTML = '';
            htmx.ajax('GET', '/analyze/?symbol=' + encodeURIComponent(symbol), {
                target: '#analysis-results',
                swap: 'innerHTML',
                indicator: '#analysis-spinner'
            });
            return;
        }
    });

    // After analysis cards appear, hide the top picks section
    document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'analysis-results') {
            document.getElementById('search-results').innerHTML = '';
            var picksSection = document.getElementById('top-picks-section');
            if (picksSection) {
                picksSection.style.display = 'none';
            }
        }
    });
</script>
{% endblock %}
