<!-- Market Context Badges -->
<div class="flex flex-wrap items-center justify-center gap-4 py-2 fade-in">
    <!-- Trend -->
    <div class="flex items-center gap-2 px-4 py-2 rounded-full shadow-sm 
        {% if trend == 'BULLISH' %}bg-green-100 dark:bg-green-900/40 border border-green-200 dark:border-green-800
        {% else %}bg-red-100 dark:bg-red-900/40 border border-red-200 dark:border-red-800{% endif %}">
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Trend</span>
        <span class="text-sm font-bold 
            {% if trend == 'BULLISH' %}text-green-700 dark:text-green-300
            {% else %}text-red-700 dark:text-red-300{% endif %}">
            {{ trend }}
        </span>
    </div>

    <!-- Volatility -->
    <div class="flex items-center gap-2 px-4 py-2 rounded-full shadow-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Volatility</span>
        <span class="text-sm font-bold 
            {% if volatility == 'HIGH' %}text-orange-600 dark:text-orange-400
            {% elif volatility == 'LOW' %}text-blue-600 dark:text-blue-400
            {% else %}text-gray-700 dark:text-gray-300{% endif %}">
            {{ volatility }}
        </span>
    </div>

    <!-- Liquidity -->
    <div class="flex items-center gap-2 px-4 py-2 rounded-full shadow-sm bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Liquidity</span>
        <span class="text-sm font-bold 
            {% if liquidity == 'HIGH' %}text-teal-600 dark:text-teal-400
            {% elif liquidity == 'LOW' %}text-red-600 dark:text-red-400
            {% else %}text-gray-700 dark:text-gray-300{% endif %}">
            {{ liquidity }} Volume
        </span>
    </div>

    <!-- HTF Bias -->
    <div class="flex items-center gap-2 px-4 py-2 rounded-full shadow-sm 
        {% if htf_bias == 'BUY' %}bg-indigo-100 dark:bg-indigo-900/40 border border-indigo-200 dark:border-indigo-800
        {% elif htf_bias == 'SELL' %}bg-rose-100 dark:bg-rose-900/40 border border-rose-200 dark:border-rose-800
        {% else %}bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700{% endif %}">
        <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">HTF Base</span>
        <span class="text-sm font-bold 
            {% if htf_bias == 'BUY' %}text-indigo-700 dark:text-indigo-300
            {% elif htf_bias == 'SELL' %}text-rose-700 dark:text-rose-300
            {% else %}text-gray-700 dark:text-gray-300{% endif %}">
            {{ htf_bias }}
        </span>
    </div>
</div>
