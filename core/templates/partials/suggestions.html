{% if symbols %}
    {% for s in symbols %}
        <div class="px-4 py-2 hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer suggestion-item"
             data-symbol="{{ s.ticker }}.NS">
            {{ s.ticker }} - {{ s.name }} ({{ s.exchange }})
        </div>
    {% endfor %}
{% else %}
    <div class="px-4 py-2 text-gray-500 dark:text-gray-400">No matching symbols</div>
{% endif %}
